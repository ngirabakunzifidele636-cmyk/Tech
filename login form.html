<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>

    <style>
        body{
            font-family: Times New Roman, serif;
            background-color:#f5f5f5;
        }

        .form-box{
            width:400px;
            margin:80px auto;
            padding:25px;
            border:1px solid #999;
            background-color:rgb(231, 231, 233);
            text-align:center;
            box-shadow:0px 5px 4.5px rgb(67, 67, 68);
            border-radius: 10px;
            border: none;
        }

        h1{
            font-size:20px;
        }

        input{
            width:250px;
            padding:8px;
            margin-top:5px;
            margin-bottom:15px;
            outline: none;
            border: none;
            box-shadow:0px 1px 1px rgb(139, 141, 226);
            border-radius: 5px;
            background-color:rgb(225, 225, 231);
        }

        button{
            padding:8px 20px;
            border-radius: 5px;
            outline: none;
            border: none;
            box-shadow:0px 2px 2px rgb(139, 141, 226);
            background-color: rgb(198, 198, 240);
            
        }

        a{
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="form-box">

    <h1>🔒 LOGIN FORM</h1>

    <form action="home.html" method="POST">

        <label><b>Email Address:</b></label><br>
        <input type="email"
               placeholder="Enter your Email Address"
               required><br>

        <label><b>Password:</b></label><br>
        <input type="password"
               placeholder="Enter your Password"
               required><br>

        <button type="submit">Log In</button>

    </form>

    <p>
        Don't Have an Account?
        <a href="Registration form.html">Create Account Here</a>
    </p>

</div>

</body>
</html>
